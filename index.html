<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Registration Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 30px 12px;
      display: flex;
      justify-content: center;
    }
    .card {
      background: #fff;
      width: 100%;
      max-width: 700px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 24px;
    }
    h1 { margin-top: 0; }
    .muted { color: #666; margin-bottom: 16px; }
    .row { margin: 6px 0; }
    .label { font-weight: 600; display: inline-block; min-width: 140px; }
    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin: 6px 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }
    button {
      background: #1f6feb;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #1558b0; }
    .small { font-size: 12px; color: #777; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="hello">Guest registration test</h1>
    <div class="muted">This page reads data from your URL and lets the guest enter personal details.</div>

    <div class="row"><span class="label">Apartment:</span> <span id="aptNameValue">-</span></div>
    <div class="row"><span class="label">Guest:</span> <span id="guestValue">-</span></div>
    <div class="row"><span class="label">Check-in:</span> <span id="checkinValue">-</span></div>
    <div class="row"><span class="label">Check-out:</span> <span id="checkoutValue">-</span></div>
    <div class="row"><span class="label">Reservation ID:</span> <span id="reservationValue">-</span></div>

    <hr style="margin: 18px 0;" />

    <form id="guestForm">
      <!-- Hidden fields from link -->
      <input type="hidden" name="reservationId" id="reservationIdInput" />
      <input type="hidden" name="aptName" id="aptNameInput" />
      <input type="hidden" name="guestName" id="guestNameInput" />
      <input type="hidden" name="guestLastName" id="guestLastNameInput" />
      <input type="hidden" name="checkin" id="checkinInput" />
      <input type="hidden" name="checkout" id="checkoutInput" />

      <label for="firstNameInputVisible">First name *</label>
      <input id="firstNameInputVisible" name="firstName" required />

      <label for="lastNameInputVisible">Last name *</label>
      <input id="lastNameInputVisible" name="lastName" required />

      <label for="birthDateInput">Date of birth *</label>
      <input id="birthDateInput" type="date" name="birthDate" required />

      <label for="documentNumberInput">ID / Passport number *</label>
      <input id="documentNumberInput" name="documentNumber" required />

      <label for="documentTypeSelect">Document type *</label>
      <select id="documentTypeSelect" name="documentType" required>
        <option value="">Select...</option>
        <option value="ID">ID card</option>
        <option value="PASSPORT">Passport</option>
      </select>

      <label for="documentIssueCountrySelect">Document issue country *</label>
      <select id="documentIssueCountrySelect" name="documentIssueCountryId" required>
        <option value="" selected>Select Country</option>
        <option value="1" data-country-code="AU">Australia</option>
        <option value="2" data-country-code="AT">Austria</option>
        <option value="3" data-country-code="AZ">Azerbaijan</option>
        <option value="4" data-country-code="AL">Albania</option>
        <option value="5" data-country-code="DZ">Algeria</option>
        <option value="37" data-country-code="BG">Bulgaria</option>
        <option value="40" data-country-code="GB">United Kingdom</option>
        <option value="51" data-country-code="DE">Germany</option>
        <option value="58" data-country-code="GR">Greece</option>
        <option value="83" data-country-code="ES">Spain</option>
        <option value="84" data-country-code="IT">Italy</option>
        <option value="92" data-country-code="CA">Canada</option>
        <option value="98" data-country-code="CN">China</option>
        <option value="131" data-country-code="MX">Mexico</option>
        <option value="144" data-country-code="NL">Netherlands</option>
        <option value="148" data-country-code="NZ">New Zealand</option>
        <option value="150" data-country-code="NO">Norway</option>
        <option value="165" data-country-code="PL">Poland</option>
        <option value="166" data-country-code="PT">Portugal</option>
        <option value="172" data-country-code="RO">Romania</option>
        <option value="173" data-country-code="RU">Russia</option>
        <option value="180" data-country-code="US">United States</option>
        <option value="197" data-country-code="SK">Slovakia</option>
        <option value="198" data-country-code="SI">Slovenia</option>
        <option value="206" data-country-code="TH">Thailand</option>
        <option value="215" data-country-code="TR">Turkey</option>
        <option value="219" data-country-code="UA">Ukraine</option>
        <option value="226" data-country-code="FI">Finland</option>
        <option value="228" data-country-code="FR">France</option>
        <option value="235" data-country-code="HR">Croatia</option>
        <option value="239" data-country-code="CZ">Czech Republic</option>
        <option value="241" data-country-code="CH">Switzerland</option>
        <option value="242" data-country-code="SE">Sweden</option>
        <option value="247" data-country-code="JP">Japan</option>
      </select>

      <!-- Hidden fields to send country name + short code -->
      <input type="hidden" id="documentIssueCountryNameInput" name="documentIssueCountryName" />
      <input type="hidden" id="documentIssueCountryCodeInput" name="documentIssueCountryCode" />

      <label style="display:flex; gap:8px; align-items:flex-start;">
        <input type="checkbox" name="consent" required style="width:auto; margin-top:3px;" />
        <span>I confirm the data is correct and I agree to processing for legal guest registration.</span>
      </label>

      <button type="submit">Submit registration</button>
    </form>

    <p class="small">Test mode: submit shows alert + browser console output.</p>
  </div>

  <script>
    function toIsoWithCurrentYear(raw) {
      if (!raw) return "";
      const parts = raw.split(", ");
      if (parts.length < 2) return raw;

      const monthDay = parts[1].trim(); // e.g. "September 18"
      const [monthName, dayStr] = monthDay.split(" ");
      const day = parseInt(dayStr, 10);

      const monthMap = {
        January: 1, February: 2, March: 3, April: 4, May: 5, June: 6,
        July: 7, August: 8, September: 9, October: 10, November: 11, December: 12
      };

      const month = monthMap[monthName];
      if (!month || Number.isNaN(day)) return raw;

      const year = new Date().getFullYear();
      return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    }

    function syncDocumentIssueCountryFields() {
      const select = document.getElementById("documentIssueCountrySelect");
      const selected = select.options[select.selectedIndex];

      const code = selected ? (selected.dataset.countryCode || "") : "";
      const name = selected && selected.value !== "" ? selected.textContent.trim() : "";

      document.getElementById("documentIssueCountryCodeInput").value = code;
      document.getElementById("documentIssueCountryNameInput").value = name;
    }

    // Read URL params
    const p = new URLSearchParams(window.location.search);
    const aptName = p.get("aptName") || "";
    const guestName = p.get("guestName") || "";
    const guestLastName = p.get("guestLastName") || "";
    const reservationId = p.get("reservationId") || "";
    const checkin = toIsoWithCurrentYear(p.get("checkin") || "");
    const checkout = toIsoWithCurrentYear(p.get("checkout") || "");

    const fullName = [guestName, guestLastName].filter(Boolean).join(" ") || "Guest";

    // Header/top block
    document.getElementById("hello").textContent = "Hello, " + fullName;
    document.getElementById("aptNameValue").textContent = aptName || "-";
    document.getElementById("guestValue").textContent = fullName || "-";
    document.getElementById("checkinValue").textContent = checkin || "-";
    document.getElementById("checkoutValue").textContent = checkout || "-";
    document.getElementById("reservationValue").textContent = reservationId || "-";

    // Hidden fields
    document.getElementById("reservationIdInput").value = reservationId;
    document.getElementById("aptNameInput").value = aptName;
    document.getElementById("guestNameInput").value = guestName;
    document.getElementById("guestLastNameInput").value = guestLastName;
    document.getElementById("checkinInput").value = checkin;
    document.getElementById("checkoutInput").value = checkout;

    // Auto-fill visible name fields
    document.getElementById("firstNameInputVisible").value = guestName;
    document.getElementById("lastNameInputVisible").value = guestLastName;

    // Country fields sync
    document.getElementById("documentIssueCountrySelect")
      .addEventListener("change", syncDocumentIssueCountryFields);
    syncDocumentIssueCountryFields();

    // Test submit
    document.getElementById("guestForm").addEventListener("submit", function (e) {
      e.preventDefault();
      syncDocumentIssueCountryFields();
      const data = Object.fromEntries(new FormData(this).entries());
      console.log("FORM DATA:", data);
      alert(
        "Test submit OK\n" +
        "documentIssueCountryId: " + (data.documentIssueCountryId || "") + "\n" +
        "documentIssueCountryName: " + (data.documentIssueCountryName || "") + "\n" +
        "documentIssueCountryCode: " + (data.documentIssueCountryCode || "")
      );
    });
  </script>
</body>
</html>
