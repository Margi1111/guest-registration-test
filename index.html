<!DOCTYPE html>

  <title>Guest Registration</title>

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      margin: 0;
      padding: 30px 12px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, #dbeafe 0%, transparent 35%),
        radial-gradient(circle at bottom left, #e9d5ff 0%, transparent 35%),
        linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
    }
    .page-wrap { width: 100%; max-width: 900px; }
    .logo-box { text-align: center; margin-bottom: 14px; }
    .logo-box img { max-width: 280px; width: 100%; height: auto; display: inline-block; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      padding: 24px;
      border: 1px solid #e5e7eb;
    }
    h1 { margin: 0 0 8px; }
    .muted { color: #666; margin-bottom: 14px; }
    .row { margin: 5px 0; }
    .label { font-weight: 600; display: inline-block; min-width: 140px; }
    input, select, button {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin: 6px 0 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
    }
    button {
      background: #1f6feb;
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #1558b0; }
    .terms-link {
      display: inline-block;
      background: #eef4ff;
      border: 1px solid #cfe0ff;
      color: #1d4ed8;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      margin: 8px 0 10px;
    }
    fieldset {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      margin: 0 0 16px 0;
    }
    legend {
      padding: 0 8px;
      font-weight: 600;
    }
  </style>
</head>

  <script>
    function toIsoWithCurrentYear(raw) {
      if (!raw) return "";
      const parts = raw.split(", ");
      if (parts.length < 2) return raw;
      const monthDay = parts[1].trim();
      const tokens = monthDay.split(" ");
      const monthName = tokens[0];
      const day = parseInt(tokens[1], 10);

      const monthMap = {
        January: 1, February: 2, March: 3, April: 4, May: 5, June: 6,
        July: 7, August: 8, September: 9, October: 10, November: 11, December: 12
      };

      const month = monthMap[monthName];
      if (!month || Number.isNaN(day)) return raw;

      const year = new Date().getFullYear();
      return year + "-" + String(month).padStart(2, "0") + "-" + String(day).padStart(2, "0");
    }

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function makeGuestBlock(idx, prefillFirstName, prefillLastName, countryOptionsHtml) {
      const first = idx === 1 ? (prefillFirstName || "") : "";
      const last = idx === 1 ? (prefillLastName || "") : "";

      return `
        <fieldset>
          <legend>Guest ${idx}</legend>

          <label for="g${idx}_firstName">First name *</label>
          <input id="g${idx}_firstName" name="g${idx}_firstName" required value="${first}" />

          <label for="g${idx}_secondName">Second name *</label>
          <input id="g${idx}_secondName" name="g${idx}_secondName" required />

          <label for="g${idx}_lastName">Last name *</label>
          <input id="g${idx}_lastName" name="g${idx}_lastName" required value="${last}" />

          <label for="g${idx}_gender">Gender *</label>
          <select id="g${idx}_gender" name="g${idx}_gender" required>
            <option value="">Select...</option>
            <option value="M">Male</option>
            <option value="F">Female</option>
          </select>

          <label for="g${idx}_birthDate">Date of birth *</label>
          <input id="g${idx}_birthDate" type="date" name="g${idx}_birthDate" required />

      
         <label id="g${idx}_identityLabel" for="g${idx}_identificationNumber">Identity Number</label>
<input
  id="g${idx}_identificationNumber"
  name="g${idx}_identificationNumber"
  maxlength="10"
  title="Identity Number: for Bulgaria- 10 symbols; for other countries- not required."
/>

          <label for="g${idx}_documentNumber">Document number *</label>
          <input
  id="g${idx}_documentNumber"
  name="g${idx}_documentNumber"
  required
  maxlength="20"
/>

          <label for="g${idx}_documentType">Document type *</label>
          <select id="g${idx}_documentType" name="g${idx}_documentType" required>
            <option value="">Select...</option>
            <option value="ICA">ID card</option>
            <option value="PAS">Passport</option>
            <option value="DRL">Driver license</option>
          </select>

          <label for="g${idx}_documentIssueCountryId">Document issue country *</label>
          <select id="g${idx}_documentIssueCountryId" name="g${idx}_documentIssueCountryId" required>
            ${countryOptionsHtml}
          </select>

          <input type="hidden" id="g${idx}_documentIssueCountryCode" name="g${idx}_documentIssueCountryCode" />
          <input type="hidden" id="g${idx}_documentIssueCountryName" name="g${idx}_documentIssueCountryName" />
        </fieldset>
      `;
    }

 function syncGuestCountryFields(idx) {
  const select = document.getElementById(`g${idx}_documentIssueCountryId`);
  const selected = select.options[select.selectedIndex];
  const code = selected ? (selected.dataset.countryCode || "") : "";
  const name = selected && selected.value !== "" ? selected.textContent.trim() : "";

  document.getElementById(`g${idx}_documentIssueCountryCode`).value = code;
  document.getElementById(`g${idx}_documentIssueCountryName`).value = name;

  const identityInput = document.getElementById(`g${idx}_identificationNumber`);
  const identityLabel = document.getElementById(`g${idx}_identityLabel`);
  const isBG = code === "BG";

  // keep title always
  identityInput.title = "Identity Number: for Bulgaria exactly 10 symbols; for other countries maximum 10.";

  if (isBG) {
    identityInput.required = true;
    identityInput.minLength = 10;
    identityInput.maxLength = 10;
    identityLabel.textContent = "Identity Number *";
  } else {
    identityInput.required = false;
    identityInput.removeAttribute("minlength");
    identityInput.maxLength = 10;
    identityLabel.textContent = "Identity Number";
  }
}
    function renderGuestBlocks(guestQty, prefillFirstName, prefillLastName) {
      const container = document.getElementById("guestBlocksContainer");
      const countryOptionsHtml = document.getElementById("countryOptionsTemplate").innerHTML;

      let html = "";
      for (let i = 1; i <= guestQty; i += 1) {
        html += makeGuestBlock(i, prefillFirstName, prefillLastName, countryOptionsHtml);
      }
      container.innerHTML = html;

      for (let i = 1; i <= guestQty; i += 1) {
        const sel = document.getElementById(`g${i}_documentIssueCountryId`);
        sel.addEventListener("change", function () { syncGuestCountryFields(i); });
        syncGuestCountryFields(i);
      }
    }

    const p = new URLSearchParams(window.location.search);
    const aptName = p.get("aptName") || "";
    const guestName = p.get("guestName") || "";
    const guestLastName = p.get("guestLastName") || "";
    const reservationId = p.get("reservationId") || "";
    const checkin = toIsoWithCurrentYear(p.get("checkin") || "");
    const checkout = toIsoWithCurrentYear(p.get("checkout") || "");
    const guestQtyRaw = parseInt(p.get("guestQty") || "1", 10);
    const guestQty = clamp(Number.isNaN(guestQtyRaw) ? 1 : guestQtyRaw, 1, 10);

    const fullName = [guestName, guestLastName].filter(Boolean).join(" ") || "Guest";

    document.getElementById("hello").textContent = "Hello, " + fullName;
    document.getElementById("aptNameValue").textContent = aptName || "-";
    document.getElementById("guestValue").textContent = fullName || "-";
    document.getElementById("checkinValue").textContent = checkin || "-";
    document.getElementById("checkoutValue").textContent = checkout || "-";
    document.getElementById("reservationValue").textContent = reservationId || "-";
    document.getElementById("guestQtyValue").textContent = String(guestQty);

    document.getElementById("reservationIdInput").value = reservationId;
    document.getElementById("aptNameInput").value = aptName;
    document.getElementById("guestNameInput").value = guestName;
    document.getElementById("guestLastNameInput").value = guestLastName;
    document.getElementById("checkinInput").value = checkin;
    document.getElementById("checkoutInput").value = checkout;
    document.getElementById("guestQtyInput").value = String(guestQty);

    renderGuestBlocks(guestQty, guestName, guestLastName);

   const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby7vrBImkVt7snwfJm7bv-yLFER7cOzJl4pAyHmrQ4dO9WWHQt6EPq4CoSuCa0Qg2yIPw/exec";

document.getElementById("guestForm").addEventListener("submit", async function (e) {
  e.preventDefault();

  for (let i = 1; i <= guestQty; i += 1) {
    syncGuestCountryFields(i);
  }

  const formData = new FormData(this);

  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (data.status === "ok") {
      alert("Registration submitted successfully.");
      this.reset();
      renderGuestBlocks(guestQty, guestName, guestLastName);
    } else {
      alert("Submission error: " + (data.message || "Unknown error"));
    }
  } catch (error) {
    alert("Network error. Please try again.");
  }
});
